server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://192.168.100.162:5432/rn_ionic
    username: rnuser
    password: rnpass

  jpa:
    hibernate:
      ddl-auto: validate
      properties:
        hibernate:
          format_sql: true
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: "mobileapi"
    access-token-minutes: 60

  flyway:
    enabled: true
logging:
  level:
    org.hibernate.SQL: debug